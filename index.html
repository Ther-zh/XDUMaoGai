<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>毛概学习站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="home">
  <header class="topbar topbar-simple">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">毛</span>
      <div class="brand-text">
        <h1>毛概学习站</h1>
        <p class="subtitle">笔记 · 刷题 · 过题</p>
      </div>
    </div>
    <nav class="site-nav" aria-label="站点导航">
      <a href="index.html" data-page="home">首页</a>
      <a href="notes.html" data-page="notes">笔记</a>
      <a href="quiz.html" data-page="quiz">刷题</a>
      <a href="recall.html" data-page="recall">过题</a>
    </nav>
    <button type="button" class="icon-btn" data-theme-toggle aria-label="切换深浅色主题">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <circle cx="9" cy="9" r="3.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M14.5 10.2A6 6 0 017.8 3.5 6 6 0 1014.5 10.2z" stroke="currentColor" stroke-width="1.3"/>
      </svg>
    </button>
  </header>

  <main class="home-main">
    <section class="home-hero">
      <h2>期末复习，一站搞定</h2>
      <p>整合精炼笔记、480+ 客观题库、简答/论述主观题库，支持背诵、刷题、自测三种模式。</p>
    </section>

    <div class="home-grid" id="homeGrid">
      <a class="home-card" href="notes.html">
        <span class="home-card-tag">背诵</span>
        <h3>精炼笔记</h3>
        <p>【记】口诀 + 【答】完整话术，章节目录、全文搜索、仅记模式。</p>
        <span class="home-card-stat" id="statNotes">—</span>
      </a>
      <a class="home-card" href="quiz.html">
        <span class="home-card-tag tag-quiz">刷题</span>
        <h3>客观刷题</h3>
        <p>单选 / 多选 / 判断，顺序或随机，自动判分，错题本复习。</p>
        <span class="home-card-stat" id="statQuiz">—</span>
      </a>
      <a class="home-card" href="recall.html">
        <span class="home-card-tag tag-recall">过题</span>
        <h3>主观过题</h3>
        <p>先看题自答，再对照答案；简答/论述分练，支持按章筛选。</p>
        <span class="home-card-stat" id="statRecall">—</span>
      </a>
    </div>

    <p class="home-tip">更新题库后运行 <code>python study-site/build.py</code> 再刷新页面。</p>
  </main>

  <script src="data.js"></script>
  <script src="quiz-data.js"></script>
  <script src="shared.js"></script>
  <script>
    (function () {
      const notes = window.STUDY_DATA;
      const quiz = window.QUIZ_DATA;
      if (notes) {
        const q = notes.sections.reduce((n, s) => n + s.questions.length, 0);
        document.getElementById("statNotes").textContent = `${notes.sections.length} 章 · ${q} 精讲题`;
      }
      if (quiz) {
        const s = quiz.stats;
        document.getElementById("statQuiz").textContent =
          `${s.objective} 题（单${s.single} / 多${s.multi} / 判${s.judge}）`;
        document.getElementById("statRecall").textContent =
          `${s.subjective} 题（简${s.short} / 论${s.essay}）`;
      }
    })();
  </script>
</body>
</html>
