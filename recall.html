<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>主观过题 · 毛概学习站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="recall">
  <header class="topbar topbar-simple">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">过</span>
      <div class="brand-text">
        <h1>主观过题</h1>
        <p class="subtitle" id="recallSubtitle">加载中…</p>
      </div>
    </div>
    <nav class="site-nav site-nav-compact" aria-label="站点导航">
      <a href="index.html" data-page="home">首页</a>
      <a href="notes.html" data-page="notes">笔记</a>
      <a href="quiz.html" data-page="quiz">刷题</a>
      <a href="recall.html" data-page="recall">过题</a>
    </nav>
    <button type="button" class="icon-btn" data-theme-toggle aria-label="切换主题">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <circle cx="9" cy="9" r="3.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M14.5 10.2A6 6 0 017.8 3.5 6 6 0 1014.5 10.2z" stroke="currentColor" stroke-width="1.3"/>
      </svg>
    </button>
  </header>

  <main class="quiz-main">
    <aside class="quiz-panel" id="recallPanel">
      <h2 class="panel-title">过题设置</h2>

      <label class="field-label">题型</label>
      <div class="chip-row" id="typeChips">
        <button type="button" class="chip active" data-type="all">全部</button>
        <button type="button" class="chip" data-type="short">简答</button>
        <button type="button" class="chip" data-type="essay">论述</button>
      </div>

      <label class="field-label">题源</label>
      <select class="field-select" id="sourceFilter">
        <option value="all">全部题源</option>
      </select>

      <label class="field-label">章节</label>
      <select class="field-select" id="chapterFilter">
        <option value="all">全部章节</option>
      </select>

      <label class="field-label">模式</label>
      <div class="chip-row">
        <button type="button" class="chip active" data-mode="random">随机</button>
        <button type="button" class="chip" data-mode="seq">顺序</button>
      </div>

      <button type="button" class="btn-primary" id="startBtn">开始过题</button>
      <p class="panel-hint" id="poolHint"></p>
    </aside>

    <section class="quiz-stage" id="recallStage">
      <div class="quiz-empty" id="recallEmpty">
        <p>先看题目，在脑中作答，再点「显示答案」对照。</p>
        <p class="muted">精炼版题目可先看【记】口诀，再展开【答】。</p>
      </div>

      <div class="quiz-session hidden" id="recallSession">
        <div class="session-head">
          <div class="session-progress">
            <span id="progressText">1 / 10</span>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          </div>
          <span class="session-meta" id="qMeta"></span>
        </div>

        <article class="recall-card" id="recallCard"></article>

        <div class="recall-actions" id="recallActions">
          <button type="button" class="btn-secondary hidden" id="showMemoBtn">显示【记】</button>
          <button type="button" class="btn-primary" id="showAnswerBtn">显示答案</button>
          <div class="recall-nav hidden" id="recallNav">
            <button type="button" class="btn-ghost" id="prevBtn">上一题</button>
            <button type="button" class="btn-secondary" id="hardBtn">还不太会</button>
            <button type="button" class="btn-primary" id="easyBtn">会了，下一题</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="quiz-data.js"></script>
  <script src="shared.js"></script>
  <script src="recall.js"></script>
</body>
</html>
